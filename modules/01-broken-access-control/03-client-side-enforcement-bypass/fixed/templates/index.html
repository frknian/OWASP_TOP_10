<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Web Security Lab</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 60px auto; padding: 0 16px; }
    h1 { font-size: 1.2rem; }
    label { display: block; margin: 12px 0 4px; font-size: 0.9rem; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; cursor: pointer; }
    #msg { margin-top: 12px; color: #c00; font-size: 0.9rem; }
    small { color: #666; display: block; margin-top: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Web Security Lab — Login</h1>
  <form id="login-form">
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Login</button>
  </form>
  <div id="msg"></div>
  <small>
    ⚠️ Bu bir güvenlik lab'ıdır. Gerçek uygulamalarda login sayfasında kullanıcı adı/şifre
    ipucu göstermek username enumeration riski taşır.
  </small>

  <script>
    // Login formu POST /login'e JSON gönderir (Senaryo 1/2 ile aynı API sözleşmesi),
    // başarılıysa session cookie set edilir ve /dashboard'a yönlendirilir.
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      if (res.ok) {
        window.location.href = "/dashboard";
      } else {
        const data = await res.json().catch(() => ({}));
        msg.textContent = data.detail || "Login failed";
      }
    });
  </script>
</body>
</html>
