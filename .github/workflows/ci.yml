name: OWASP Top 10 Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-security:
    name: Code Quality & Security Audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Lint & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Python Syntax Check
        run: |
          python -m compileall -q control-panel/
          python -m compileall -q modules/

      - name: Run Blocking Security Scan (Bandit)
        run: |
          echo "=== Running blocking security scan on control-panel and fixed scenario versions ==="
          bandit -r control-panel/ modules/*/*/fixed/ -x "**/venv/**,**/files/**" -s B105,B404,B603,B607

      - name: Run Informational Security Scan (Bandit - Non-Blocking)
        run: |
          echo "=== Running non-blocking educational security scan on vulnerable scenario versions ==="
          bandit -r modules/*/*/vulnerable/ -x "**/venv/**,**/files/**" || true

      - name: Run Blocking Dependency Audit (pip-audit)
        run: |
          echo "=== Auditing control-panel, requirements-dev, and fixed versions ==="
          # Audit control-panel and requirements-dev
          pip-audit -r control-panel/requirements.txt -r requirements-dev.txt
          # Audit fixed scenarios (blocking if vulnerabilities exist)
          for f in modules/*/*/fixed/requirements.txt; do
            if [ -f "$f" ]; then
              echo "Auditing fixed requirements: $f"
              pip-audit -r "$f"
            fi
          done

      - name: Run Informational Dependency Audit (pip-audit - Non-Blocking)
        run: |
          echo "=== Auditing vulnerable versions (non-blocking for deliberate vulnerability demonstration) ==="
          for f in modules/*/*/vulnerable/requirements.txt; do
            if [ -f "$f" ]; then
              echo "Auditing vulnerable requirements: $f"
              pip-audit -r "$f" || true
            fi
          done

  integration-tests:
    name: Integration Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Pytest Integration Suite
        run: |
          PYTHONPATH=. pytest -m "not slow and not browser" --junitxml=test-results.xml --cov=. --cov-report=xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            test-results.xml
            coverage.xml
