[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register markers
markers =
    vulnerable: tests targeting vulnerable scenarios.
    fixed: tests targeting fixed/secured scenarios.
    slow: tests that take longer to run (e.g. timeout verification).
    browser: tests that interact with browser automation (selenium/playwright).
    defanged: tests targeting defanged/simulated scenarios.
    integration: integration tests that start subprocesses and execute network requests.
